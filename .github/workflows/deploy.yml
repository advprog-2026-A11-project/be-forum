name: Deploy

on:
  workflow_run:
    workflows: ["CI - Build Test Coverage Sonar"] # this usually takes the longest
    types:
      - completed

jobs:
  check-workflow-status:
    runs-on: ubuntu-latest
    outputs:
      all_success: ${{ steps.check-status.outputs.all_success }}
    steps:
      - name: Check status of linter.yml
        id: check-lint
        uses: actions/github-script@v6
        with:
          script: |
            const { data: lint } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'linter.yml',
              branch: 'main',
              event: 'push',
              status: 'completed',
              per_page: 5
            });

            console.log("=== DEBUG LINTER RUNS ===");
            console.log("Total runs returned:", lint.workflow_runs.length);

            lint.workflow_runs.forEach((run, i) => {
              console.log(`Run[${i}]`);
              console.log("  id:", run.id);
              console.log("  status:", run.status);
              console.log("  conclusion:", run.conclusion);
              console.log("  event:", run.event);
              console.log("  head_branch:", run.head_branch);
              console.log("  created_at:", run.created_at);
            });

            if (lint.workflow_runs.length === 0) {
              console.log("❌ No workflow runs found");
              return false;
            }

            const latest = lint.workflow_runs[0];
            console.log("✅ Using latest run conclusion:", latest.conclusion);

            return latest.conclusion === 'success';
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}

      - name: Check status of scorecard.yml
        id: check-scorecard
        uses: actions/github-script@v6
        with:
          script: |
            const { data: scorecard } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'scorecard.yml',
              branch: 'main',
              event: 'push',
              status: 'completed',
              per_page: 1
            });
            if (scorecard.workflow_runs.length === 0) {
              return false;
            }
            return scorecard.workflow_runs[0].conclusion === 'success';
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}

      - name: Check status of sonarcloud.yml
        id: check-sonar
        uses: actions/github-script@v6
        with:
          script: |
            const { data: sonar } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'sonarcloud.yml',
              branch: 'main',
              event: 'push',
              status: 'completed',
              per_page: 1
            });
            if (sonar.workflow_runs.length === 0) {
              return false;
            }
            return sonar.workflow_runs[0].conclusion === 'success';
        env:
          GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}

      - name: Verify all workflows succeeded
        id: check-status
        run: |
          if [[ "${{ steps.check-lint.outputs.result }}" == "true" && \
               "${{ steps.check-scorecard.outputs.result }}" == "true" && \
               "${{ steps.check-sonar.outputs.result }}" == "true" ]]; then
            echo "all_success=true" >> $GITHUB_OUTPUT
          else
            echo "all_success=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: check-workflow-status
    if: ${{ needs.check-workflow-status.outputs.all_success == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@62216b50636a8c8c25d246437857ed84232019ca
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@c382f710d39a5bb4e430307530a720f50c2d3318
        with:
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO_NAME }}:latest
      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.SSH_USERNAME }}/app"
      - name: Releasing New Version
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/${{ secrets.SSH_USERNAME }}/app
            docker compose down || true
            echo "${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}" | docker login -u "${{ secrets.DOCKER_HUB_USERNAME }}" --password-stdin
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/${{ secrets.DOCKER_HUB_REPO_NAME }}:latest
            cat > .env << EOL
            POSTGRES_DB=${{ secrets.POSTGRES_DB }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            EOL
            docker compose up --build -d
            docker ps